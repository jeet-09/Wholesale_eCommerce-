# =============================================================================
# B2B Restaurant Procurement Platform — local/dev orchestration
# -----------------------------------------------------------------------------
#   docker compose up --build
#
# Brings up:
#   - db                 : PostgreSQL 15 (named volume for persistence)
#   - migrate            : one-shot — migrations + raw SQL constraints + seed
#   - backend            : Fastify API (waits for migrate to finish)
#   - frontend-restaurant: Restaurant portal   → http://localhost:3000
#   - frontend-admin     : Admin portal        → http://localhost:3001
#   - frontend-vendor    : Vendor portal       → http://localhost:3002
#   - frontend-ops       : Operations portal   → http://localhost:3003
#
# All four portals run the SAME image; the role is selected per-container via the
# runtime PORTAL env. Each port is a separate origin, so you can be logged in as
# a different role on each one simultaneously.
#
# Secrets/URLs you must set live in backend/.env. See SETUP.md for the checklist.
# =============================================================================

# Shared build config for every portal (built once, reused by all four).
x-frontend-build: &frontend-build
  context: ./frontend
  args:
    # NEXT_PUBLIC_* must be baked in at build time (browser-side code).
    NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-4000}

services:
  db:
    image: postgres:15-alpine
    container_name: procurement-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-procurement}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-procurement}
      POSTGRES_DB: ${POSTGRES_DB:-procurement}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-procurement} -d ${POSTGRES_DB:-procurement}']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: prepare the schema, constraints and demo data, then exit.
  migrate:
    build:
      context: ./backend
    container_name: procurement-migrate
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to point at the compose `db` service.
      DATABASE_URL: postgresql://${POSTGRES_USER:-procurement}:${POSTGRES_PASSWORD:-procurement}@db:5432/${POSTGRES_DB:-procurement}?schema=public
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db execute --file ./prisma/sql/constraints.sql --schema ./prisma/schema.prisma &&
             npm run db:seed"
    restart: 'no'

  backend:
    build:
      context: ./backend
    container_name: procurement-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-procurement}:${POSTGRES_PASSWORD:-procurement}@db:5432/${POSTGRES_DB:-procurement}?schema=public
      HOST: 0.0.0.0
      PORT: 4000
    ports:
      - '${BACKEND_PORT:-4000}:4000'
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    # The image's default CMD applies migrations+constraints then starts the API.

  # Restaurant portal (default) — build the shared image once here.
  frontend-restaurant:
    build: *frontend-build
    image: procurement-frontend
    container_name: procurement-frontend-restaurant
    restart: unless-stopped
    environment:
      PORTAL: restaurant
    ports:
      - '${RESTAURANT_PORT:-3000}:3000'
    depends_on:
      - backend

  # Admin portal — reuses the image built by frontend-restaurant.
  frontend-admin:
    build: *frontend-build
    image: procurement-frontend
    container_name: procurement-frontend-admin
    restart: unless-stopped
    environment:
      PORTAL: admin
    ports:
      - '${ADMIN_PORT:-3001}:3000'
    depends_on:
      - frontend-restaurant

  # Vendor portal.
  frontend-vendor:
    build: *frontend-build
    image: procurement-frontend
    container_name: procurement-frontend-vendor
    restart: unless-stopped
    environment:
      PORTAL: vendor
    ports:
      - '${VENDOR_PORT:-3002}:3000'
    depends_on:
      - frontend-restaurant

  # Operations portal.
  frontend-ops:
    build: *frontend-build
    image: procurement-frontend
    container_name: procurement-frontend-ops
    restart: unless-stopped
    environment:
      PORTAL: ops
    ports:
      - '${OPS_PORT:-3003}:3000'
    depends_on:
      - frontend-restaurant

volumes:
  pgdata:
    driver: local
